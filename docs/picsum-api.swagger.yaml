openapi: 3.0.3
info:
  title: Picsum API consumed by PicsumService
  version: 1.0.0
  description: |
    OpenAPI contract for all endpoints consumed in src/app/image-gallery/services/picsum/picsum.service.ts.
    This includes list and metadata endpoints, plus all dynamic image URL variants generated by the service.
servers:
  - url: /picsum
    description: Relative base URL configured in environment.apiUrls.picsumBaseUrl
paths:
  /v2/list:
    get:
      tags: [Picsum]
      summary: List images
      description: Returns a paginated list of image metadata records.
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          description: Successful image list response
          headers:
            Link:
              description: Pagination link header for the next page
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PicsumImage'
  /id/{id}/info:
    get:
      tags: [Picsum]
      summary: Get image metadata by id
      parameters:
        - $ref: '#/components/parameters/ImageIdPath'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          description: Metadata for an image id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PicsumImage'
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /seed/{seed}/info:
    get:
      tags: [Picsum]
      summary: Get image metadata by seed
      parameters:
        - $ref: '#/components/parameters/SeedPath'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          description: Metadata for deterministic seed selection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PicsumImage'
  /{width}:
    get:
      tags: [Picsum]
      summary: Get random image by width
      parameters:
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /{width}.{format}:
    get:
      tags: [Picsum]
      summary: Get random image by width and format
      parameters:
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/FormatPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /{width}/{height}:
    get:
      tags: [Picsum]
      summary: Get random image by width and height
      parameters:
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/HeightPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /{width}/{height}.{format}:
    get:
      tags: [Picsum]
      summary: Get random image by width, height, and format
      parameters:
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/HeightPath'
        - $ref: '#/components/parameters/FormatPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /id/{id}/{width}:
    get:
      tags: [Picsum]
      summary: Get image by id and width
      parameters:
        - $ref: '#/components/parameters/ImageIdPath'
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /id/{id}/{width}.{format}:
    get:
      tags: [Picsum]
      summary: Get image by id, width, and format
      parameters:
        - $ref: '#/components/parameters/ImageIdPath'
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/FormatPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /id/{id}/{width}/{height}:
    get:
      tags: [Picsum]
      summary: Get image by id, width, and height
      parameters:
        - $ref: '#/components/parameters/ImageIdPath'
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/HeightPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /id/{id}/{width}/{height}.{format}:
    get:
      tags: [Picsum]
      summary: Get image by id, width, height, and format
      parameters:
        - $ref: '#/components/parameters/ImageIdPath'
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/HeightPath'
        - $ref: '#/components/parameters/FormatPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /seed/{seed}/{width}:
    get:
      tags: [Picsum]
      summary: Get seeded image by width
      parameters:
        - $ref: '#/components/parameters/SeedPath'
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /seed/{seed}/{width}.{format}:
    get:
      tags: [Picsum]
      summary: Get seeded image by width and format
      parameters:
        - $ref: '#/components/parameters/SeedPath'
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/FormatPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /seed/{seed}/{width}/{height}:
    get:
      tags: [Picsum]
      summary: Get seeded image by width and height
      parameters:
        - $ref: '#/components/parameters/SeedPath'
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/HeightPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
  /seed/{seed}/{width}/{height}.{format}:
    get:
      tags: [Picsum]
      summary: Get seeded image by width, height, and format
      parameters:
        - $ref: '#/components/parameters/SeedPath'
        - $ref: '#/components/parameters/WidthPath'
        - $ref: '#/components/parameters/HeightPath'
        - $ref: '#/components/parameters/FormatPath'
        - $ref: '#/components/parameters/GrayscaleQuery'
        - $ref: '#/components/parameters/BlurQuery'
        - $ref: '#/components/parameters/RandomQuery'
        - $ref: '#/components/parameters/MswModeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ImageBinary'
        '400':
          description: Invalid image query options
          content:
            text/plain:
              schema:
                type: string
components:
  parameters:
    MswModeQuery:
      name: __msw
      in: query
      required: false
      description: Mock routing mode used by local development and tests.
      schema:
        type: string
        enum: [mock, real]
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    ImageIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    SeedPath:
      name: seed
      in: path
      required: true
      schema:
        type: string
    WidthPath:
      name: width
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    HeightPath:
      name: height
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    FormatPath:
      name: format
      in: path
      required: true
      schema:
        type: string
        enum: [jpg, webp]
    GrayscaleQuery:
      name: grayscale
      in: query
      required: false
      description: Optional grayscale flag.
      schema:
        type: boolean
    BlurQuery:
      name: blur
      in: query
      required: false
      description: Blur intensity.
      schema:
        type: integer
        minimum: 1
        maximum: 10
    RandomQuery:
      name: random
      in: query
      required: false
      description: Optional random seed value accepted by Picsum image endpoints.
      schema:
        type: integer
  responses:
    ImageBinary:
      description: Binary image payload
      content:
        image/jpeg:
          schema:
            type: string
            format: binary
        image/webp:
          schema:
            type: string
            format: binary
  schemas:
    PicsumImage:
      type: object
      required:
        - id
        - author
        - width
        - height
        - url
        - download_url
      properties:
        id:
          type: string
        author:
          type: string
        width:
          type: integer
        height:
          type: integer
        url:
          type: string
          format: uri
        download_url:
          type: string
          format: uri
    ErrorMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
